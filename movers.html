<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日 RS 排名上升榜 — HK / A股 / 美股</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#e8e0d0;font-family:"Noto Sans TC",sans-serif;font-size:15px;min-height:100vh}
a{color:#d4a647;text-decoration:none}
a:hover{text-decoration:underline}
#pw-overlay{position:fixed;inset:0;background:#080808;z-index:9999;display:flex;align-items:center;justify-content:center}
.pw-box{background:#0d0d14;border:1px solid #1e1e2e;border-radius:8px;padding:40px 36px;text-align:center;width:100%;max-width:380px}
.pw-box h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px}
.pw-box p{font-size:13px;color:#888;margin-bottom:8px}
.pw-hint{font-size:13px;color:#d4a647;margin-bottom:16px}
.pw-box input{width:100%;background:#1a1a2e;border:1px solid #2a2a3e;color:#e8e0d0;padding:10px 14px;border-radius:4px;font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:.15em;margin-bottom:12px}
.pw-box input:focus{border-color:#d4a647}
.pw-box button{width:100%;background:#d4a647;color:#080808;border:none;padding:11px;border-radius:4px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.pw-error{color:#ef5350;font-size:12px;margin-top:8px;min-height:18px}
.page-header{background:#0d0d14;border-bottom:1px solid #1e1e2e;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.back-btn{color:#d4a647;font-size:13px;border:1px solid #d4a64766;padding:6px 14px;border-radius:4px}
.back-btn:hover{background:#d4a64720;text-decoration:none}
.page-title{font-size:20px;font-weight:700;color:#fff}
.page-subtitle{font-size:12px;color:#888;margin-top:2px}
main{max-width:1280px;margin:0 auto;padding:24px}
.market-section{margin-bottom:48px}
.market-header{display:flex;align-items:baseline;gap:14px;padding:8px 0 16px;border-bottom:2px solid #d4a64766;margin-bottom:14px}
.market-name{font-size:22px;font-weight:700;color:#d4a647}
.market-meta{font-size:12px;color:#888}
.market-meta b{color:#e8e0d0}
table{width:100%;border-collapse:collapse}
thead tr{background:#0d0d14;border-bottom:2px solid #d4a64744}
th{padding:9px 10px;text-align:left;font-size:12px;font-weight:700;color:#d4a647;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#e8bc5a}
tbody tr{border-bottom:1px solid #1a1a2e;transition:background .15s}
tbody tr:hover{background:#1a1a2e}
td{padding:7px 10px;vertical-align:middle;white-space:nowrap;font-size:13px}
td.rank{text-align:center;color:#888;width:36px}
td.sym{color:#d4a647;font-weight:600}
td.name{color:#ccc;max-width:240px;overflow:hidden;text-overflow:ellipsis}
td.sector{color:#888;font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis}
td.num{text-align:center}
td.amount{text-align:right;color:#aaa;font-size:12px}
.delta{display:inline-block;min-width:36px;padding:2px 7px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;background:#1a3a2a;color:#4caf50;border:1px solid #4caf5066}
.delta.neg{background:#3a1a1a;color:#ef5350;border-color:#ef535066}
.cmp{display:inline-block;min-width:30px;padding:2px 7px;border-radius:8px;font-size:13px;font-weight:700;text-align:center}
.cmp-99{background:#1a3a2a;color:#4caf50;border:1px solid #4caf5066}
.cmp-80{background:#1a2a3a;color:#64b5f6;border:1px solid #64b5f666}
.cmp-60{background:#2a2a1a;color:#ffb74d;border:1px solid #ffb74d66}
.cmp-40{background:#3a1a1a;color:#ef5350;border:1px solid #ef535066}
.cmp-20{background:#2a0a0a;color:#b71c1c;border:1px solid #b71c1c66}
.arrow-prev{color:#666;font-size:11px;margin-right:4px}
.empty{text-align:center;padding:40px;color:#555;font-size:13px}
@media (max-width:768px){
  td.name{max-width:140px}
  td.sector{display:none}
  th:nth-child(4){display:none}
}
</style>
</head>
<body>

<div id="pw-overlay">
  <div class="pw-box">
    <h2>每日 RS 排名上升榜</h2>
    <p>HK / A股 / 美股 — Top 100 movers</p>
    <p class="pw-hint">密碼可到 Patreon 聊天區獲取</p>
    <input type="password" id="pw-input" placeholder="密碼" autocomplete="off">
    <button onclick="checkPassword()">進入</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<div class="page-header">
  <a href="/" class="back-btn">&#8592; 返回主頁</a>
  <div>
    <div class="page-title">每日 RS 排名上升榜</div>
    <div class="page-subtitle" id="data-date">載入中&#8230;</div>
  </div>
</div>

<main id="content"></main>

<script>
const _PW_HASH = "d1bf68d365e3d8caa4968fc2b53d5f788534b511c6d2b59c67937d36abd3d591"; // member password (login.html)
// ENC_PASS read from sessionStorage (set by login.html or this page after auth)
function _getEncPass(){ return sessionStorage.getItem("unified_auth_pw") || ""; }
const MARKETS = [
  { key: 'hk', name: '港股 (HK)', file: 'hk_rs_movers.enc', currency: 'HKD' },
  { key: 'cn', name: 'A 股 (CN)',  file: 'cn_rs_movers.enc', currency: 'CNY' },
  { key: 'us', name: '美股 (US)', file: 'us_rs_movers.enc', currency: 'USD' },
];

async function _sha256(s){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function checkPassword(){
  const h = await _sha256(document.getElementById('pw-input').value);
  if (h === _PW_HASH){
    document.getElementById('pw-overlay').style.display='none';
    sessionStorage.setItem('movers_auth','1');
    sessionStorage.setItem('unified_auth_pw', document.getElementById('pw-input').value);
    await loadAll();
  } else {
    document.getElementById('pw-error').textContent='密碼錯誤，請再試';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('movers_auth')==='1' || sessionStorage.getItem('unified_auth')==='1'){
    document.getElementById('pw-overlay').style.display='none';
    loadAll();
  } else {
    document.getElementById('pw-input').focus();
    document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key==='Enter') checkPassword(); });
  }
});

async function deriveKey(password, salt){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:100_000, hash:"SHA-256" },
    km, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
}

async function decryptAsset(b64){
  const raw = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const salt=raw.slice(0,16), nonce=raw.slice(16,28), ct=raw.slice(28);
  const key = await deriveKey(_getEncPass(), salt);
  const pt  = await crypto.subtle.decrypt({ name:"AES-GCM", iv:nonce }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

function fmtMcap(v, currency){
  if (v == null) return '—';
  // Convert to local 億 for HK/CN, $ B for US
  if (currency === 'USD'){
    if (v >= 1e12) return '$' + (v/1e12).toFixed(2) + 'T';
    if (v >= 1e9)  return '$' + (v/1e9).toFixed(1)  + 'B';
    if (v >= 1e6)  return '$' + (v/1e6).toFixed(0)  + 'M';
    return '$' + v.toFixed(0);
  } else {
    // 100M = 1億
    if (v >= 1e10) return (v/1e8).toFixed(0) + ' 億';
    if (v >= 1e8)  return (v/1e8).toFixed(1) + ' 億';
    if (v >= 1e4)  return (v/1e4).toFixed(0) + ' 萬';
    return v.toFixed(0);
  }
}

function fmtAmount(v){
  if (v == null) return '—';
  if (v >= 1e9) return (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return Math.round(v);
}

function cmpClass(v){
  if (v == null) return 'cmp';
  if (v >= 81) return 'cmp cmp-99';
  if (v >= 61) return 'cmp cmp-80';
  if (v >= 41) return 'cmp cmp-60';
  if (v >= 21) return 'cmp cmp-40';
  return 'cmp cmp-20';
}

function buildMarketSection(market, data){
  const rows = data.movers || [];
  const date = data.date || '';
  let html = `<section class="market-section" id="m-${market.key}">
    <div class="market-header">
      <div class="market-name">${market.name}</div>
      <div class="market-meta">數據截至 <b>${date}</b> · Top <b>${rows.length}</b> · 平均 delta <b>${rows.length ? (rows.reduce((s,r)=>s+r.delta,0)/rows.length).toFixed(1) : 0}</b></div>
    </div>`;
  if (!rows.length){
    html += '<div class="empty">無數據</div></section>';
    return html;
  }
  html += `<table>
    <thead><tr>
      <th>#</th><th>代碼</th><th>公司名稱</th><th>行業</th><th>市值</th>
      <th style="text-align:center">Composite</th>
      <th style="text-align:center">Delta</th>
      <th style="text-align:center">5日</th>
      <th style="text-align:center">20日</th>
      <th style="text-align:center">50日</th>
      <th style="text-align:right">成交額</th>
    </tr></thead>
    <tbody>`;
  for (const r of rows){
    const name = r.name_zh || r.name_en || r.symbol;
    const today = r.composite_today, yest = r.composite_yesterday, delta = r.delta;
    const dCls = delta < 0 ? 'delta neg' : 'delta';
    const sign = delta > 0 ? '+' : '';
    html += `<tr>
      <td class="rank">${r.rank}</td>
      <td class="sym">${r.symbol}</td>
      <td class="name" title="${(r.name_en||'').replace(/"/g,'&quot;')}">${name}</td>
      <td class="sector">${r.sector || '—'}</td>
      <td class="amount">${fmtMcap(r.market_cap, market.currency)}</td>
      <td class="num"><span class="${cmpClass(today)}">${today}</span><span class="arrow-prev"> ←${yest}</span></td>
      <td class="num"><span class="${dCls}">${sign}${delta}</span></td>
      <td class="num"><span class="${cmpClass(r.rs_rating_5d)}">${r.rs_rating_5d ?? '—'}</span></td>
      <td class="num"><span class="${cmpClass(r.rs_rating_20d)}">${r.rs_rating_20d ?? '—'}</span></td>
      <td class="num"><span class="${cmpClass(r.rs_rating_50d)}">${r.rs_rating_50d ?? '—'}</span></td>
      <td class="amount">${fmtAmount(r.amount)}</td>
    </tr>`;
  }
  html += '</tbody></table></section>';
  return html;
}

async function loadAll(){
  document.getElementById('content').innerHTML = '<div class="empty">載入中…</div>';
  const all = {};
  for (const m of MARKETS){
    try{
      const resp = await fetch(m.file);
      const b64 = await resp.text();
      all[m.key] = await decryptAsset(b64.trim());
    } catch(e){
      console.error('Failed to load', m.file, e);
      all[m.key] = { date:'-', movers:[] };
    }
  }
  // Pick latest date for header
  const dates = MARKETS.map(m => all[m.key].date).filter(d => d && d !== '-');
  const headerDate = dates.length ? dates.sort().slice(-1)[0] : '';
  document.getElementById('data-date').textContent = headerDate ? `數據截至 ${headerDate} · 三市場 RS Composite 評分排名上升榜` : '無數據';

  let html = '';
  for (const m of MARKETS){
    html += buildMarketSection(m, all[m.key]);
  }
  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
