<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#e8e0d0;font-family:"Noto Sans TC",sans-serif;font-size:20px;min-height:100vh}
#pw-overlay{position:fixed;inset:0;background:#080808;z-index:9999;display:flex;align-items:center;justify-content:center}
.pw-box{background:#0d0d14;border:1px solid #1e1e2e;border-radius:8px;padding:40px 36px;text-align:center;width:100%;max-width:360px}
.pw-box h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px}
.pw-box p{font-size:13px;color:#888;margin-bottom:24px}
.pw-box input{width:100%;background:#1a1a2e;border:1px solid #2a2a3e;color:#e8e0d0;padding:10px 14px;border-radius:4px;font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:.15em;margin-bottom:12px;transition:border-color .2s}
.pw-box input:focus{border-color:#d4a647}
.pw-box button{width:100%;background:#d4a647;color:#080808;border:none;padding:11px;border-radius:4px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s}
.pw-box button:hover{background:#e8bc5a}
.pw-error{color:#ef5350;font-size:12px;margin-top:8px;min-height:18px}
a{color:#d4a647;text-decoration:none}
a:hover{text-decoration:underline}
.page-header{background:#0d0d14;border-bottom:1px solid #1e1e2e;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.back-btn{color:#d4a647;font-size:13px;border:1px solid #d4a64766;padding:6px 14px;border-radius:4px;transition:background .2s}
.back-btn:hover{background:#d4a64720;text-decoration:none}
.page-title{font-size:20px;font-weight:700;color:#fff}
.page-subtitle{font-size:12px;color:#888;margin-top:2px}
.filter-bar{background:#0d0d14;border-bottom:1px solid #1e1e2e;padding:16px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
select,input[type=text]{background:#1a1a2e;border:1px solid #2a2a3e;color:#e8e0d0;padding:7px 10px;border-radius:4px;font-size:13px;font-family:inherit;min-width:120px;cursor:pointer;outline:none;transition:border-color .2s}
select:focus,input[type=text]:focus{border-color:#d4a647}
input[type=text]{min-width:180px}
.filter-actions{display:flex;gap:8px;align-items:flex-end;margin-left:auto}
.btn{padding:7px 16px;border-radius:4px;font-size:13px;font-family:inherit;cursor:pointer;border:none;transition:all .2s;font-weight:600}
.btn-primary{background:#d4a647;color:#080808}
.btn-primary:hover{background:#e8bc5a}
.btn-ghost{background:transparent;border:1px solid #444;color:#aaa}
.btn-ghost:hover{border-color:#d4a647;color:#d4a647}
.stats-bar{padding:10px 24px;background:#0a0a12;border-bottom:1px solid #1e1e2e;font-size:12px;color:#888;display:flex;gap:16px;flex-wrap:wrap}
.stats-bar span b{color:#d4a647;font-size:14px}
.table-wrap{overflow-x:auto;padding:0 0 40px}
table{width:100%;border-collapse:collapse;min-width:960px}
thead tr{background:#0d0d14;border-bottom:2px solid #d4a64744}
th{padding:10px 12px;text-align:left;font-size:14px;font-weight:700;color:#d4a647;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#e8bc5a}
th.sort-asc .sort-icon::after{content:" ▲"}
th.sort-desc .sort-icon::after{content:" ▼"}
th:not(.sort-asc):not(.sort-desc) .sort-icon::after{content:" ⇅";opacity:.4}
tbody tr{border-bottom:1px solid #1a1a2e;transition:background .15s}
tbody tr:hover{background:#1a1a2e}
td{padding:9px 12px;vertical-align:middle;white-space:nowrap}
td.code{color:#d4a647;font-weight:600;font-size:15px}
td.name{color:#fff;font-weight:600;max-width:160px;white-space:normal;word-break:break-all}
td.industry{color:#aaa;font-size:16px}
td.num{text-align:center !important;font-size:15px}
td.num.pos{color:#4caf50}
td.num.neg{color:#ef5350}
td.num.na{color:#555}
.tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:15px;font-weight:700}
.tag-growth{background:#1a3a2a;color:#4caf50;border:1px solid #4caf5044}
.tag-value{background:#1a2a3a;color:#64b5f6;border:1px solid #64b5f644}
.tag-spec{background:#3a2a1a;color:#ff9800;border:1px solid #ff980044}
.tag-trouble{background:#2a1a1a;color:#ef5350;border:1px solid #ef535044}
.tag-na{background:#1e1e1e;color:#666;border:1px solid #33333344}
.tag-large{background:#2a1a3a;color:#ce93d8;border:1px solid #ce93d844}
.tag-mid{background:#1a2a3a;color:#90caf9;border:1px solid #90caf944}
.tag-small{background:#1a1e2a;color:#78909c;border:1px solid #78909c44}
.tag-yes{background:#1a3a1a;color:#66bb6a;border:1px solid #66bb6a44}
.tag-no{background:#2a1a1a;color:#ef9a9a;border:1px solid #ef9a9a44}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:20px 24px;flex-wrap:wrap}
.page-btn{background:#1a1a2e;border:1px solid #2a2a3e;color:#aaa;padding:6px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s}
.page-btn:hover,.page-btn.active{background:#d4a64720;border-color:#d4a647;color:#d4a647}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-info{color:#666;font-size:13px;padding:0 8px}
.empty{text-align:center;padding:60px 20px;color:#555}
.empty-icon{font-size:40px;margin-bottom:12px}
</style>
</head>

<script>
function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === 'ai10xpro') {
    document.getElementById('pw-overlay').style.display = 'none';
    sessionStorage.setItem('hkdb_auth', '1');
  } else {
    const err = document.getElementById('pw-error');
    err.textContent = '密碼錯誤，請再試';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('hkdb_auth') === '1') {
    document.getElementById('pw-overlay').style.display = 'none';
  } else {
    document.getElementById('pw-input').focus();
    document.getElementById('pw-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  }
});

function parseNum(v) {
  if (!v || v === '#VALUE!' || v === '' || v === '—') return null;
  return parseFloat(v.replace(/[%,]/g, ''));
}

function numCell(v) {
  const n = parseNum(v);
  if (n === null) return '<td class="num na">—</td>';
  const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : '';
  return '<td class="num ' + cls + '">' + v + '</td>';
}

function typeTag(v) {
  const map = {'成長股':'growth','價值股':'value','投機股':'spec','困境股':'trouble','資料不足':'na'};
  const cls = map[v] || 'na';
  return '<span class="tag tag-' + cls + '">' + (v || '—') + '</span>';
}

function capTag(v) {
  const map = {'大型股':'large','中型股':'mid','小型股':'small','資料不足':'na'};
  const cls = map[v] || 'na';
  return '<span class="tag tag-' + cls + '">' + (v || '—') + '</span>';
}

function perfTag(v) {
  if (v === 'YES') return '<span class="tag tag-yes">✓ 好</span>';
  if (v === 'NO') return '<span class="tag tag-no">✗ 差</span>';
  return '<span class="tag tag-na">—</span>';
}

function applyFilters() {
  const search = document.getElementById('f-search').value.trim().toLowerCase();
  const industry = document.getElementById('f-industry').value;
  const cap = document.getElementById('f-cap').value;
  const type1m = document.getElementById('f-type1m').value;
  const type3m = document.getElementById('f-type3m').value;

  filtered = RAW_DATA.filter(s => {
    if (search && !s.code.toLowerCase().includes(search) && !s.name.toLowerCase().includes(search)) return false;
    if (industry && s.industry !== industry) return false;
    if (cap && s.cap_type !== cap) return false;
    if (type1m && s.type_1m !== type1m) return false;
    if (type3m && s.type_3m !== type3m) return false;
    return true;
  });

  currentPage = 1;
  if (sortCol) doSort(false);
  render();
}

function resetFilters() {
  ['f-search','f-industry','f-cap','f-type1m','f-type3m'].forEach(function(id) {
    const el = document.getElementById(id);
    el.value = '';
  });
  filtered = [...RAW_DATA];
  currentPage = 1;
  render();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(function(th) {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === col) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
  doSort(true);
  render();
}

function doSort(resetPage) {
  filtered.sort(function(a, b) {
    let av = a[sortCol], bv = b[sortCol];
    const an = parseNum(av), bn = parseNum(bv);
    if (an !== null && bn !== null) return (an - bn) * sortDir;
    if (an !== null) return -sortDir;
    if (bn !== null) return sortDir;
    return ((av || '').localeCompare(bv || '', 'zh-Hant')) * sortDir;
  });
  if (resetPage) currentPage = 1;
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = page.map(function(s) {
      return '<tr>' +
        '<td class="code">' + s.code + '</td>' +
        '<td class="name">' + s.name + '</td>' +
        '<td class="industry">' + (s.industry || '—') + '</td>' +
        numCell(s.mktcap) +
        '<td>' + capTag(s.cap_type) + '</td>' +
        numCell(s.rev_growth_h2) +
        numCell(s.gp_growth_h2) +
        numCell(s.rel_1m) +
        numCell(s.rel_3m) +
        '<td>' + typeTag(s.type_1m) + '</td>' +
        '<td>' + typeTag(s.type_3m) + '</td>' +
        '</tr>';
    }).join('');
  }

  const counts = {'成長股':0,'價值股':0,'投機股':0,'困境股':0};
  filtered.forEach(function(s) { if (counts[s.type_1m] !== undefined) counts[s.type_1m]++; });
  document.getElementById('stats-bar').innerHTML =
    '<span>共 <b>' + filtered.length + '</b> 隻</span>' +
    Object.entries(counts).map(function(e) { return '<span>' + e[0] + ' <b>' + e[1] + '</b></span>'; }).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (total <= 1) { pag.innerHTML = ''; return; }

  let html = '<button class="page-btn" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>&#8249;</button>';

  const range = [];
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || Math.abs(i - currentPage) <= 2) range.push(i);
    else if (range[range.length-1] !== '…') range.push('…');
  }
  range.forEach(function(p) {
    if (p === '…') html += '<span class="page-info">…</span>';
    else html += '<button class="page-btn ' + (p===currentPage?'active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  });

  html += '<button class="page-btn" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===total?'disabled':'') + '>&#8250;</button>';
  html += '<span class="page-info">' + currentPage + ' / ' + total + ' 頁</span>';
  pag.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('f-search').addEventListener('keydown', function(e) { if (e.key === 'Enter') applyFilters(); });

// Init: sort by market cap descending
doSort(false);
document.querySelectorAll('th').forEach(function(th) {
  if (th.dataset.col === 'mktcap') th.classList.add('sort-desc');
});
render();
</script>
</body>
