*{box-sizing:border-box;margin:0;padding:0}

a{color:#d4a647;text-decoration:none}

.pw-box button{width:100%;background:#d4a647;color:#080808;border:none;padding:11px;border-radius:4px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s}

.page-header{background:#0d0d14;border-bottom:1px solid #1e1e2e;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.back-btn{color:#d4a647;font-size:13px;border:1px solid #d4a64766;padding:6px 14px;border-radius:4px;transition:background .2s}
.back-btn:hover{background:#d4a64720;text-decoration:none}
.page-title{font-size:20px;font-weight:700;color:#fff}
.page-subtitle{font-size:12px;color:#888;margin-top:2px}
.filter-bar{background:#0d0d14;border-bottom:1px solid #1e1e2e;padding:16px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
select,input[type=text]{background:#1a1a2e;border:1px solid #2a2a3e;color:#e8e0d0;padding:7px 10px;border-radius:4px;font-size:13px;font-family:inherit;min-width:120px;cursor:pointer;outline:none;transition:border-color .2s}

.filter-actions{display:flex;gap:8px;align-items:flex-end;margin-left:auto}
.btn{padding:7px 16px;border-radius:4px;font-size:13px;font-family:inherit;cursor:pointer;border:none;transition:all .2s;font-weight:600}

.stats-bar{padding:10px 24px;background:#0a0a12;border-bottom:1px solid #1e1e2e;font-size:12px;color:#888;display:flex;gap:16px;flex-wrap:wrap}

.table-wrap{overflow-x:auto;padding:0 0 40px}
table{width:100%;border-collapse:collapse;min-width:1000px}
thead tr{background:#0d0d14;border-bottom:2px solid #d4a64744}

/* ── Multi-select dropdown ─────────────────────────────────── */
.ms-wrap{position:relative;display:inline-block}

<script>
const _PW_HASH = "10c5bd68eb8eed0b5397e40b7cd4265dbc9e956193320b5f2b96dfc20ff5d467";
async function _sha256(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function checkPassword() {
  const h = await _sha256(document.getElementById('pw-input').value);
  if (h === _PW_HASH) {
    document.getElementById('pw-overlay').style.display = 'none';
    sessionStorage.setItem('usdb_auth', '1');
  } else {
    document.getElementById('pw-error').textContent = '密碼錯誤，請再試';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('usdb_auth') === '1') {
    document.getElementById('pw-overlay').style.display = 'none';
  } else {
    document.getElementById('pw-input').focus();
    document.getElementById('pw-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  }
});

const PAGE_SIZE = 50;
let filtered = [...RAW_DATA];
let sortCol = 'mktcap';
let sortDir = -1;
let currentPage = 1;

const industries = [...new Set(RAW_DATA.map(s => s.industry).filter(Boolean))].sort((a,b) => a.localeCompare(b,'zh-Hant'));
msInit('f-industry', industries);

function parseNum(v) {
  if (!v || v === '#VALUE!' || v === '' || v === '—') return null;
  return parseFloat(v.replace(/[%,]/g, ''));
}

function numCell(v) {
  const n = parseNum(v);
  if (n === null) return '<td class="num na">—</td>';
  const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : '';
  return '<td class="num ' + cls + '">' + v + '</td>';
}

function typeTag(v) {
  const map = {'成長股':'growth','價值股':'value','投機股':'spec','困境股':'trouble','資料不足':'na'};
  return '<span class="tag tag-' + (map[v]||'na') + '">' + (v||'—') + '</span>';
}

function capTag(v) {
  const map = {'大型股':'large','中型股':'mid','小型股':'small','資料不足':'na'};
  return '<span class="tag tag-' + (map[v]||'na') + '">' + (v||'—') + '</span>';
}

function applyFilters() {
  const search = document.getElementById('f-search').value.trim().toLowerCase();
  const industries_sel = msGetById('f-industry');
  const caps    = msGetById('f-cap');
  const type1ms = msGetById('f-type1m');
  const type3ms = msGetById('f-type3m');

  filtered = RAW_DATA.filter(function(s) {
    if (search && !s.code.toLowerCase().includes(search) &&
        !s.name.toLowerCase().includes(search) &&
        !s.en_name.toLowerCase().includes(search)) return false;
    if (industries_sel.length && !industries_sel.includes(s.industry)) return false;
    if (caps.length    && !caps.includes(s.cap_type))    return false;
    if (type1ms.length && !type1ms.includes(s.type_1m))  return false;
    if (type3ms.length && !type3ms.includes(s.type_3m))  return false;
    return true;
  });
  currentPage = 1;
  if (sortCol) doSort(false);
  render();
}

function resetFilters() {
  ['f-industry','f-cap','f-type1m','f-type3m'].forEach(function(id) { msClearById(id); });
  filtered = [...RAW_DATA];
  currentPage = 1;
  render();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(function(th) {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === col) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
  doSort(true); render();
}

function doSort(resetPage) {
  filtered.sort(function(a, b) {
    let av = a[sortCol], bv = b[sortCol];
    const an = parseNum(av), bn = parseNum(bv);
    if (an !== null && bn !== null) return (an - bn) * sortDir;
    if (an !== null) return -sortDir;
    if (bn !== null) return sortDir;
    return ((av||'').localeCompare(bv||'','zh-Hant')) * sortDir;
  });
  if (resetPage) currentPage = 1;
}

function render() {
  const start = (currentPage-1) * PAGE_SIZE;
  const page = filtered.slice(start, start+PAGE_SIZE);
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  if (filtered.length === 0) {
    tbody.innerHTML = ''; empty.style.display = '';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = page.map(function(s) {
      return '<tr>' +
        '<td class="code">' + s.code + '</td>' +
        '<td class="name">' + s.name + '</td>' +
        '<td class="en-name">' + s.en_name + '</td>' +
        '<td class="industry">' + (s.industry||'—') + '</td>' +
        numCell(s.mktcap) +
        '<td>' + capTag(s.cap_type) + '</td>' +
        numCell(s.rev_growth) +
        numCell(s.gp_growth) +
        numCell(s.rel_1m) +
        numCell(s.rel_3m) +
        '<td>' + typeTag(s.type_1m) + '</td>' +
        '<td>' + typeTag(s.type_3m) + '</td>' +
        '</tr>';
    }).join('');
  }
  const counts = {'成長股':0,'價值股':0,'投機股':0,'困境股':0};
  filtered.forEach(function(s) { if (counts[s.type_1m]!==undefined) counts[s.type_1m]++; });
  document.getElementById('stats-bar').innerHTML =
    '<span>共 <b>' + filtered.length + '</b> 隻</span>' +
    Object.entries(counts).map(function(e){ return '<span>'+e[0]+' <b>'+e[1]+'</b></span>'; }).join('');
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (total <= 1) { pag.innerHTML = ''; return; }
  let html = '<button class="page-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>&#8249;</button>';
  const range = [];
  for (let i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=2) range.push(i);
    else if (range[range.length-1]!=='…') range.push('…');
  }
  range.forEach(function(p) {
    if (p==='…') html += '<span class="page-info">…</span>';
    else html += '<button class="page-btn '+(p===currentPage?'active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  });
  html += '<button class="page-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===total?'disabled':'')+'>&#8250;</button>';
  html += '<span class="page-info">'+currentPage+' / '+total+' 頁</span>';
  pag.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p<1||p>total) return;
  currentPage = p; render();
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('f-search').addEventListener('keydown', function(e) { if(e.key==='Enter') applyFilters(); });

msInit('f-cap',    ['大型股','中型股','小型股']);
msInit('f-type1m', ['成長股','價值股','投機股','困境股','資料不足']);
msInit('f-type3m', ['成長股','價值股','投機股','困境股','資料不足']);

doSort(false);
document.querySelectorAll('th').forEach(function(th) {
  if (th.dataset.col==='mktcap') th.classList.add('sort-desc');
});
render();

/* ── Multi-select helpers ───────────────────────────────────── */
function msInit(wrapperId, opts) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const btn = wrap.querySelector('.ms-btn');
  const drop = wrap.querySelector('.ms-dropdown');
  // Build options
  opts.forEach(function(opt) {
    const label = document.createElement('label');
    label.className = 'ms-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.value = opt;
    cb.addEventListener('change', function() { msUpdateBtn(wrap); });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(opt));
    drop.appendChild(label);
  });
  const clear = document.createElement('div');
  clear.className = 'ms-clear';
  clear.textContent = '清除選擇';
  clear.addEventListener('click', function(e) { e.stopPropagation(); msClear(wrap); });
  drop.appendChild(clear);
  btn.addEventListener('click', function(e) { e.stopPropagation(); msToggle(wrap); });
}

function msToggle(wrap) {
  const isOpen = wrap.classList.contains('open');
  document.querySelectorAll('.ms-wrap.open').forEach(function(w) { w.classList.remove('open'); });
  if (!isOpen) wrap.classList.add('open');
}

function msClear(wrap) {
  wrap.querySelectorAll('input[type=checkbox]').forEach(function(cb) { cb.checked = false; });
  msUpdateBtn(wrap);
}

function msUpdateBtn(wrap) {
  const btn = wrap.querySelector('.ms-btn');
  const selected = msGetSelected(wrap);
  btn.textContent = selected.length ? selected.join(', ') : (btn.dataset.placeholder || '全部');
  btn.title = btn.textContent;
}

function msGetSelected(wrap) {
  const vals = [];
  wrap.querySelectorAll('input[type=checkbox]:checked').forEach(function(cb) { vals.push(cb.value); });
  return vals;
}

function msGetById(id) {
  const wrap = document.getElementById(id);
  return wrap ? msGetSelected(wrap) : [];
}

function msClearById(id) {
  const wrap = document.getElementById(id);
  if (wrap) msClear(wrap);
}

document.addEventListener('click', function() {
  document.querySelectorAll('.ms-wrap.open').forEach(function(w) { w.classList.remove('open'); });
});

</script>
