<script>
const data=JSON.parse(document.getElementById('data').textContent);
let active=Object.keys(data.markets)[0];
const money=v=>{if(!Number.isFinite(+v))return'NA';const x=+v;if(Math.abs(x)>=1e12)return(x/1e12).toFixed(2)+'T';if(Math.abs(x)>=1e9)return(x/1e9).toFixed(2)+'B';if(Math.abs(x)>=1e6)return(x/1e6).toFixed(2)+'M';return x.toFixed(0);};
const pct=v=>Number.isFinite(+v)?(v>=0?'+':'')+(v*100).toFixed(2)+'%':'NA';
const cls=v=>Number.isFinite(+v)?(v>=0?'up':'down'):'';
function medianRs(card){
  const rs=(card.top||[]).map(s=>s.rs).sort((a,b)=>a-b);
  if(!rs.length)return 0;
  const mid=Math.floor(rs.length/2);
  return rs.length%2!==0?rs[mid]:(rs[mid-1]+rs[mid])/2;
}
function renderTabs(){
  const tabs=document.getElementById('tabs');tabs.innerHTML='';
  Object.entries(data.markets).forEach(([m,x])=>{
    const b=document.createElement('button');b.className='tab'+(m===active?' active':'');b.textContent=x.label;
    b.onclick=()=>{active=m;renderTabs();renderMeta();renderContent();};tabs.appendChild(b);
  });
}
function renderMeta(){
  const x=data.markets[active],m=document.getElementById('meta');
  m.innerHTML=`<span>RS date: <b>${x.rs_date}</b></span><span>RS count: <b>${x.rs_count}</b></span><span>Theme date: <b>${x.theme_date}</b></span><span>Themes: <b>${x.theme_count}</b></span><span>Generated: <b>${data.generated_at}</b></span>`;
}
function stockRows(stocks,asc){
  const sorted=asc?[...stocks].sort((a,b)=>a.rs-b.rs):[...stocks].sort((a,b)=>b.rs-a.rs);
  return sorted.slice(0,8).map(s=>`<tr><td><span class="symbol">${s.symbol}</span><br><span class="stock-name">${s.name||''}</span></td><td class="num">${s.rs}</td><td class="num ${cls(s.ret5)}">${pct(s.ret5)}</td><td class="num ${cls(s.ret20)}">${pct(s.ret20)}</td><td class="num">${money(s.amount)}</td></tr>`).join('');
}
function renderContent(){
  const x=data.markets[active];
  const cards=x.cards.map(c=>({...c,mRs:medianRs(c)}));
  cards.sort((a,b)=>b.mRs-a.mRs);
  const strong=cards.slice(0,8),weak=cards.slice(-8).reverse();
  const cardHTML=(c,asc)=>`<div class="card"><div class="section-title"><h2>${c.theme}</h2><span class="pill">${c.n_with_data}/${c.n} stocks · mRS ${c.mRs.toFixed(1)}</span></div><div class="meta" style="margin:0 0 12px"><span>5D <b class="${cls(c.return_5d)}">${pct(c.return_5d)}</b></span><span>Mcap <b>${money(c.total_market_cap)}</b></span></div><table><thead><tr><th>Stock</th><th class="num">RS</th><th class="num">5D</th><th class="num">20D</th><th class="num">Amount</th></tr></thead><tbody>${stockRows(c.top||[],asc)}</tbody></table></div>`;
  document.getElementById('content').innerHTML=`<div class="grid"><section><div class="card"><div class="section-title"><h2>最強主題 Top 8</h2><span class="pill">by RS median · stocks RS 高→低</span></div></div><div style="height:12px"></div>${strong.map(c=>cardHTML(c,false)).join('')}</section><section><div class="card"><div class="section-title"><h2>最弱主題 Top 8</h2><span class="pill">by RS median · stocks RS 低→高</span></div></div><div style="height:12px"></div>${weak.map(c=>cardHTML(c,true)).join('')}</section></div>`;
}
renderTabs();renderMeta();renderContent();
</script>
