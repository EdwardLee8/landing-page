<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股關鍵字資料庫</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0f'/><text y='24' x='4' font-size='22' fill='%23d4a647'>鍵</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#e8e0d0;font-family:"Noto Sans TC",sans-serif;font-size:15px;min-height:100vh}
a{color:#d4a647;text-decoration:none}
a:hover{text-decoration:underline}

/* ── Password overlay ── */
#pw-overlay{position:fixed;inset:0;background:#080808;z-index:9999;display:flex;align-items:center;justify-content:center}
.pw-box{background:#0d0d14;border:1px solid #1e1e2e;border-radius:8px;padding:40px 36px;text-align:center;width:100%;max-width:360px}
.pw-box h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px}
.pw-box p{font-size:13px;color:#888;margin-bottom:16px}
.pw-box input{width:100%;background:#1a1a2e;border:1px solid #2a2a3e;color:#e8e0d0;padding:10px 14px;border-radius:4px;font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:.15em;margin-bottom:12px;transition:border-color .2s}
.pw-box input:focus{border-color:#d4a647}
.pw-box button{width:100%;background:#d4a647;color:#080808;border:none;padding:11px;border-radius:4px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s}
.pw-box button:hover{background:#e8bc5a}
.pw-error{color:#ef5350;font-size:12px;margin-top:8px;min-height:18px}

/* ── Page layout ── */
#app{display:none}
.page-header{background:#0d0d14;border-bottom:1px solid #1e1e2e;padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.back-btn{color:#d4a647;font-size:13px;border:1px solid #d4a64766;padding:6px 14px;border-radius:4px;transition:background .2s;white-space:nowrap}
.back-btn:hover{background:#d4a64720;text-decoration:none}
.page-title{font-size:20px;font-weight:700;color:#fff}
.page-subtitle{font-size:12px;color:#888;margin-top:2px}

/* ── Tab bar ── */
.tab-bar{background:#0d0d14;border-bottom:1px solid #1e1e2e;padding:0 24px;display:flex;gap:0}
.tab{padding:14px 20px;font-size:14px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.tab.active{color:#d4a647;border-bottom-color:#d4a647}
.tab:hover:not(.active){color:#bbb}

/* ── Search bar ── */
.search-wrap{padding:20px 24px;background:#080808;border-bottom:1px solid #111}
.search-box{position:relative;max-width:600px}
.search-box input{width:100%;background:#1a1a2e;border:1px solid #2a2a3e;color:#e8e0d0;padding:11px 44px 11px 16px;border-radius:6px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#d4a647}
.search-box .clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;font-size:18px;cursor:pointer;line-height:1;padding:2px 4px;transition:color .2s;display:none}
.search-box .clear-btn:hover{color:#d4a647}
.search-box .clear-btn.visible{display:block}
.search-hint{font-size:12px;color:#666;margin-top:8px}

/* ── Results ── */
.results{padding:0 24px 40px}
.result-count{font-size:12px;color:#666;padding:12px 0 8px}
.result-count b{color:#d4a647}

/* Company card (keyword search result) */
.company-card{background:#0d0d14;border:1px solid #1e1e2e;border-radius:6px;padding:14px 16px;margin-bottom:10px;transition:border-color .2s}
.company-card:hover{border-color:#2a2a3e}
.company-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.co-symbol{color:#d4a647;font-weight:700;font-size:15px;font-family:monospace;min-width:64px}
.co-name{color:#fff;font-weight:600;font-size:14px}
.co-sector{font-size:12px;color:#888;background:#1a1a2e;padding:2px 8px;border-radius:10px;margin-left:auto}
.kw-list{display:flex;flex-wrap:wrap;gap:6px}
.kw-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer;transition:all .2s;user-select:none}
.kw-tag:hover{opacity:.8;transform:scale(1.02)}
.kw-tag .kw-en{font-weight:600;color:#e8e0d0}
.kw-tag .kw-zh{color:#aaa;font-size:11px}
.kw-tag .kw-dot{color:#555;margin:0 1px}
.kw-high{background:#1e2a1e;border:1px solid #4caf5044}
.kw-mid{background:#1e1e2a;border:1px solid #5c6bc044}
.kw-low{background:#1e1e1e;border:1px solid #33333344}

/* Keyword result (company→keyword mode) */
.kw-result-card{background:#0d0d14;border:1px solid #1e1e2e;border-radius:6px;padding:16px;margin-bottom:10px}
.kw-result-header{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.kw-result-en{font-size:16px;font-weight:700;color:#fff}
.kw-result-zh{font-size:13px;color:#aaa}
.kw-result-count{font-size:12px;color:#888;margin-left:auto}
.kw-co-list{display:flex;flex-wrap:wrap;gap:6px}
.kw-co-item{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:4px;padding:4px 10px;font-size:13px;cursor:pointer;transition:all .2s;color:#d4a647;font-weight:600;font-family:monospace}
.kw-co-item:hover{border-color:#d4a647;background:#d4a64720}
.kw-co-name{font-size:11px;color:#888;font-family:"Noto Sans TC",sans-serif;font-weight:400;display:block;margin-top:1px}

/* Loading / empty */
.loading{text-align:center;padding:60px 20px;color:#555}
.loading .spinner{width:32px;height:32px;border:2px solid #222;border-top-color:#d4a647;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#555;font-size:14px}

/* Highlight match */
mark{background:#d4a64730;color:#e8bc5a;border-radius:2px;padding:0 1px}

/* Stats bar */
.stats-bar{padding:8px 24px;background:#0a0a12;border-bottom:1px solid #1e1e2e;font-size:12px;color:#666;display:flex;gap:16px;flex-wrap:wrap}
.stats-bar b{color:#d4a647}
</style>
</head>
<body>

<!-- ── Password overlay ───────────────────────────────────── -->
<div id="pw-overlay">
  <div class="pw-box">
    <h2>美股關鍵字資料庫</h2>
    <p>此頁面受密碼保護</p>
    <input type="password" id="pw-input" placeholder="輸入密碼" autocomplete="off" maxlength="64">
    <button id="pw-submit">進入</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<!-- ── Main app ───────────────────────────────────────────── -->
<div id="app">
  <div class="page-header">
    <a href="/" class="back-btn">← 返回首頁</a>
    <div>
      <div class="page-title">美股關鍵字資料庫</div>
      <div class="page-subtitle">US Stocks Business Keywords</div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-tab="kw2co" onclick="switchTab('kw2co')">關鍵字 → 公司</div>
    <div class="tab" data-tab="co2kw" onclick="switchTab('co2kw')">公司 → 關鍵字</div>
  </div>

  <div class="stats-bar" id="stats-bar">
    <span>載入中...</span>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜尋關鍵字（英文或中文）" autocomplete="off" spellcheck="false">
      <button class="clear-btn" id="clear-btn" title="清除" onclick="clearSearch()">×</button>
    </div>
    <div class="search-hint" id="search-hint">輸入關鍵字，例如：artificial intelligence、人工智能</div>
  </div>

  <div class="results" id="results">
    <div class="empty" id="initial-msg">請輸入關鍵字開始搜尋</div>
  </div>
</div>

<script>
// ── Password gate ─────────────────────────────────────────
const PW_HASH = "4a8d4c6f2b9e1a3f7c5d0e8b2a4f6c9d1e3b5a7f9c2e4d6a8b0c3f5e7a1d2b4c";
const CORRECT_PW = "US_stock_Key_worD";
const SESSION_KEY = "us_kw_auth";

function sha256(s) {
  // Simple check — compare directly (client-side only, not security-critical)
  return s === CORRECT_PW;
}

function checkPassword() {
  const val = document.getElementById("pw-input").value;
  if (sha256(val)) {
    sessionStorage.setItem(SESSION_KEY, "1");
    document.getElementById("pw-overlay").style.display = "none";
    document.getElementById("app").style.display = "block";
    initApp();
  } else {
    document.getElementById("pw-error").textContent = "密碼錯誤，請重試";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

document.getElementById("pw-submit").addEventListener("click", checkPassword);
document.getElementById("pw-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkPassword();
  document.getElementById("pw-error").textContent = "";
});

if (sessionStorage.getItem(SESSION_KEY) === "1") {
  document.getElementById("pw-overlay").style.display = "none";
  document.getElementById("app").style.display = "block";
  initApp();
}

// ── App state ─────────────────────────────────────────────
let DB = [];            // raw JSON array
let KW_INDEX = {};      // keyword en (lowercase) → {en, zh, companies:[{s,n,sec,w}]}
let KW_ZH_INDEX = {};   // keyword zh → same entry
let CO_INDEX = {};      // symbol → {s,n,sec,kws:[{e,z,w}]}
let currentTab = "kw2co";
let searchTimer = null;

async function initApp() {
  const statsBar = document.getElementById("stats-bar");
  statsBar.innerHTML = "<span>載入資料中...</span>";

  try {
    const resp = await fetch("us_keywords_export.json");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    DB = await resp.json();
  } catch(e) {
    statsBar.innerHTML = `<span style="color:#ef5350">載入失敗: ${e.message}</span>`;
    return;
  }

  // Build indexes
  let totalKws = 0;
  for (const co of DB) {
    CO_INDEX[co.s] = co;
    if (!co.kws) continue;
    for (const kw of co.kws) {
      totalKws++;
      const key = kw.e.toLowerCase().trim();
      if (!KW_INDEX[key]) {
        KW_INDEX[key] = { en: kw.e, zh: kw.z || "", companies: [] };
        if (kw.z) KW_ZH_INDEX[kw.z.trim()] = KW_INDEX[key];
      }
      KW_INDEX[key].companies.push({ s: co.s, n: co.n, sec: co.sec || "", w: kw.w || 0.5 });
    }
  }

  // Sort companies by weight descending for each keyword
  for (const entry of Object.values(KW_INDEX)) {
    entry.companies.sort((a, b) => b.w - a.w);
  }

  const nCo = DB.length;
  const nKw = Object.keys(KW_INDEX).length;
  statsBar.innerHTML = `<span><b>${nCo.toLocaleString()}</b> 間公司</span><span><b>${nKw.toLocaleString()}</b> 個關鍵字</span><span><b>${totalKws.toLocaleString()}</b> 個映射記錄</span>`;

  // Wire up search
  const input = document.getElementById("search-input");
  input.addEventListener("input", () => {
    const val = input.value;
    document.getElementById("clear-btn").classList.toggle("visible", val.length > 0);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => runSearch(val.trim()), 250);
  });

  document.getElementById("initial-msg").textContent = "請輸入關鍵字或公司名稱開始搜尋";
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));

  const input = document.getElementById("search-input");
  const hint = document.getElementById("search-hint");
  if (tab === "kw2co") {
    input.placeholder = "搜尋關鍵字（英文或中文）";
    hint.textContent = "輸入關鍵字，例如：artificial intelligence、人工智能";
  } else {
    input.placeholder = "搜尋公司名稱或股票代號";
    hint.textContent = "輸入股票代號或公司名稱，例如：AAPL、Apple";
  }

  const val = input.value.trim();
  if (val) runSearch(val);
  else {
    document.getElementById("results").innerHTML = '<div class="empty">請輸入搜尋內容</div>';
  }
}

function clearSearch() {
  const input = document.getElementById("search-input");
  input.value = "";
  input.focus();
  document.getElementById("clear-btn").classList.remove("visible");
  document.getElementById("results").innerHTML = '<div class="empty">請輸入搜尋內容</div>';
}

function hl(text, query) {
  if (!query) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return escHtml(text).replace(new RegExp(escaped, "gi"), m => `<mark>${m}</mark>`);
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function kwColor(w) {
  if (w >= 0.8) return "kw-high";
  if (w >= 0.6) return "kw-mid";
  return "kw-low";
}

// ── Search logic ──────────────────────────────────────────

function runSearch(query) {
  if (!query) {
    document.getElementById("results").innerHTML = '<div class="empty">請輸入搜尋內容</div>';
    return;
  }
  if (currentTab === "kw2co") searchKw2Co(query);
  else searchCo2Kw(query);
}

function searchKw2Co(query) {
  const q = query.toLowerCase();
  const results = [];

  // Exact key match first
  const exactEn = KW_INDEX[q];
  if (exactEn) results.push({ entry: exactEn, score: 2 });

  // Partial match on English keys
  for (const [key, entry] of Object.entries(KW_INDEX)) {
    if (key === q) continue;
    if (key.includes(q)) {
      results.push({ entry, score: 1 });
    }
  }
  // Chinese match
  for (const [zh, entry] of Object.entries(KW_ZH_INDEX)) {
    const alreadyIn = results.some(r => r.entry === entry);
    if (!alreadyIn && zh.includes(query)) {
      results.push({ entry, score: 1.5 });
    }
  }

  results.sort((a, b) => b.score - a.score || b.entry.companies.length - a.entry.companies.length);
  const top = results.slice(0, 50);

  const resultsDiv = document.getElementById("results");
  if (!top.length) {
    resultsDiv.innerHTML = `<div class="result-count">找不到相關關鍵字</div>`;
    return;
  }

  let html = `<div class="result-count">找到 <b>${results.length}</b> 個關鍵字，顯示前 ${top.length} 個</div>`;
  for (const { entry } of top) {
    const cos = entry.companies.slice(0, 60);
    html += `<div class="kw-result-card">
      <div class="kw-result-header">
        <span class="kw-result-en">${hl(entry.en, query)}</span>
        ${entry.zh ? `<span class="kw-result-zh">${hl(entry.zh, query)}</span>` : ""}
        <span class="kw-result-count">${entry.companies.length} 間公司</span>
      </div>
      <div class="kw-co-list">`;
    for (const co of cos) {
      html += `<div class="kw-co-item" onclick="jumpToCompany('${escHtml(co.s)}')">
        ${escHtml(co.s)}
        <span class="kw-co-name">${escHtml(co.n.length > 22 ? co.n.slice(0,22)+"…" : co.n)}</span>
      </div>`;
    }
    if (entry.companies.length > 60) {
      html += `<div style="font-size:12px;color:#666;align-self:center;padding:4px 8px">…還有 ${entry.companies.length - 60} 間</div>`;
    }
    html += `</div></div>`;
  }
  resultsDiv.innerHTML = html;
}

function searchCo2Kw(query) {
  const q = query.toLowerCase();
  const matches = [];

  for (const co of DB) {
    const symMatch = co.s.toLowerCase().includes(q);
    const nameMatch = co.n.toLowerCase().includes(q);
    if (symMatch || nameMatch) {
      matches.push({ co, score: symMatch ? (co.s.toLowerCase() === q ? 3 : 2) : 1 });
    }
  }
  matches.sort((a, b) => b.score - a.score);
  const top = matches.slice(0, 30);

  const resultsDiv = document.getElementById("results");
  if (!top.length) {
    resultsDiv.innerHTML = `<div class="result-count">找不到相關公司</div>`;
    return;
  }

  let html = `<div class="result-count">找到 <b>${matches.length}</b> 間公司，顯示前 ${top.length} 間</div>`;
  for (const { co } of top) {
    const kws = (co.kws || []).slice(0, 30);
    html += `<div class="company-card">
      <div class="company-header">
        <span class="co-symbol">${hl(co.s, query.toUpperCase())}</span>
        <span class="co-name">${hl(co.n, query)}</span>
        ${co.sec ? `<span class="co-sector">${escHtml(co.sec)}</span>` : ""}
      </div>`;
    if (kws.length) {
      html += `<div class="kw-list">`;
      for (const kw of kws) {
        html += `<span class="kw-tag ${kwColor(kw.w)}" onclick="searchByKw('${escHtml(kw.e)}')">
          <span class="kw-en">${escHtml(kw.e)}</span>
          ${kw.z ? `<span class="kw-dot">·</span><span class="kw-zh">${escHtml(kw.z)}</span>` : ""}
        </span>`;
      }
      html += `</div>`;
    } else {
      html += `<div style="font-size:12px;color:#555">無關鍵字資料</div>`;
    }
    html += `</div>`;
  }
  resultsDiv.innerHTML = html;
}

function jumpToCompany(symbol) {
  switchTab("co2kw");
  const input = document.getElementById("search-input");
  input.value = symbol;
  document.getElementById("clear-btn").classList.add("visible");
  runSearch(symbol);
}

function searchByKw(kw) {
  switchTab("kw2co");
  const input = document.getElementById("search-input");
  input.value = kw;
  document.getElementById("clear-btn").classList.add("visible");
  runSearch(kw);
}
</script>
</body>
</html>
